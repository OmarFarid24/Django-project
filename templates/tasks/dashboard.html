{% extends 'base.html' %}

{% block content %}

<h1 class="text-3xl font-bold mb-6">Mis listas</h1>

<div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
    {% for list in lists %}
        <div class="bg-white shadow rounded p-4">
            <h2 class="text-xl font-semibold">{{ list.name }}</h2>
            <p class="text-gray-500 mt-2">
                Usuario: {{ list.user.email }}
            </p>
        </div>
    {% empty %}
        <p class="text-gray-500">No hay listas todavía.</p>
    {% endfor %}
</div>

{% endblock %}
